name: Daily sync

on:
  schedule:
    # 05:00 Chile Standard Time = 08:00 UTC (CLT is UTC-3, CLST is UTC-4)
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure git
        run: |
          git config user.name "ley-chile-bot"
          git config user.email "bot@ley-chile"

      - name: Run daily sync
        run: python scripts/sync_daily.py

      - name: Push changes
        run: |
          git push origin HEAD
