name: Daily sync

on:
  schedule:
    # 05:00 Chile Standard Time = 08:00 UTC (CLT is UTC-3, CLST is UTC-4)
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      days:
        description: "Days back to search via opt=40 (default: 3)"
        required: false
        default: "3"
      skip_rebuild:
        description: "Skip git fast-import history rebuild"
        required: false
        default: "false"
        type: boolean

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure git
        run: |
          git config user.name "ley-chile-bot"
          git config user.email "bot@ley-chile"

      - name: Set up historial worktree
        run: |
          git fetch origin historial
          git worktree add historial historial

      - name: Run daily sync
        env:
          LEYCHILE_DATA_ROOT: ${{ github.workspace }}/historial
        run: |
          ARGS="--days ${{ github.event.inputs.days || '3' }}"
          if [ "${{ github.event.inputs.skip_rebuild }}" = "true" ]; then
            ARGS="$ARGS --skip-rebuild"
          fi
          python scripts/sync_daily.py $ARGS

      - name: Push historial branch
        run: git push origin historial

      - name: Run tests
        run: python -m pytest --tb=short -q
