name: Update Graph

on:
  workflow_dispatch:
  schedule:
    # BOOTSTRAP MODE — every 30 min.  Combined with the pipeline-graph
    # concurrency group (cancel-in-progress: false), each tick queues a
    # *pending* successor that starts the instant the active 6h run ends,
    # so the graph fetch self-chains across the 6h wall-clock limit until
    # graph_shards/ reaches the 95% publish threshold and lands on main.
    # Post-bootstrap these become cheap no-ops (catalog skips, fetch_normas
    # reports "Nothing to do").  REVERT to "0 6 * * 1" (weekly) once the
    # graph is published, or it keeps firing forever.
    - cron: "*/30 * * * *"

concurrency:
  group: pipeline-graph
  cancel-in-progress: false

jobs:
  update-graph:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure git
        run: |
          git config user.name "ley-chile-bot"
          git config user.email "bot@ley-chile"

      # ── pipeline-cache worktree ──────────────────────────────────────────────
      # All norma JSON files land in ./cache/normas/ (inside the worktree) and
      # are automatically staged on the next commit step.
      - name: Set up pipeline-cache worktree
        run: |
          CODE_BRANCH=$(git rev-parse --abbrev-ref HEAD)
          if git fetch origin pipeline-cache 2>/dev/null; then
            git worktree add cache pipeline-cache
          else
            git checkout --orphan pipeline-cache
            git rm -rf . --quiet
            git commit --allow-empty -m "init: pipeline-cache branch"
            git push origin pipeline-cache
            git checkout "$CODE_BRANCH"
            git worktree add cache pipeline-cache
          fi

      # ── Restore cross-run state from pipeline-cache ──────────────────────────
      # catalog.json, the graph (graph_shards/), and progress.json live in the
      # pipeline-cache branch so they survive across separate workflow runs.
      # graph_shards/ is the sharded graph (idNorma % 16) that keeps every file
      # under GitHub's 100MB push limit; a legacy monolithic graph.json is still
      # restored as a fallback so an old cache bootstraps cleanly on first run.
      - name: Restore state from pipeline-cache
        run: |
          cp ./cache/catalog.json            . 2>/dev/null && echo "Restored catalog.json"             || echo "No catalog.json in cache — will fetch fresh"
          if [ -d ./cache/graph_shards ]; then
            rm -rf ./graph_shards && cp -r ./cache/graph_shards . && echo "Restored graph_shards ($(ls ./graph_shards | wc -l) shards)"
          else
            cp ./cache/graph.json . 2>/dev/null && echo "Restored legacy graph.json" || echo "No graph in cache — will build fresh"
          fi
          cp ./cache/fetch_normas_progress.json . 2>/dev/null && echo "Restored fetch_normas_progress.json" || echo "No progress file in cache"

      # ── Update README progress bar (Graph Build Status) ──────────────────────
      # Renders fetch_normas progress (graph nodes / catalog total) into the
      # GRAPH_STATUS section of README.md on main.  Runs here — on the reliable
      # path, before the long fetch — using the state just restored from cache,
      # so it always executes (the end-of-run save races the 6h cancellation
      # grace window).  The bar therefore reflects cumulative progress as of the
      # previous run, updating roughly once per 6h run.
      - name: Update README progress bar
        run: |
          if [ ! -f catalog.json ] || { [ ! -d graph_shards ] && [ ! -f graph.json ]; }; then
            echo "No catalog/graph yet — skipping README update"
            exit 0
          fi
          python scripts/update_readme_status.py --section graph \
            --readme README.md \
            --graph-path ./graph.json \
            --catalog-path ./catalog.json
          git add README.md
          if git diff --cached --quiet; then
            echo "README unchanged"
          else
            git commit -m "chore: update graph progress bar [skip ci]"
            for i in 1 2 3; do
              git push origin "${{ github.ref_name }}" && break
              git fetch origin "${{ github.ref_name }}" && git rebase "origin/${{ github.ref_name }}" || git rebase --abort
              sleep $((i * 3))
            done
          fi

      # ── Step 1: build / refresh catalog ─────────────────────────────────────
      # build_catalog.py skips automatically if catalog.json is complete and
      # younger than 7 days (restored from cache above).  On first run it fetches
      # ~358k entries from BCN SPARQL (~4h 10min); subsequent runs finish in <1s.
      - name: Build catalog
        run: python scripts/build_catalog.py --data-root .

      # Persist catalog to pipeline-cache immediately so the next run can skip it.
      - name: Save catalog to pipeline-cache
        run: |
          cp catalog.json ./cache/catalog.json
          git -C cache add catalog.json
          if git -C cache diff --cached --quiet; then
            echo "catalog.json unchanged"
          else
            git -C cache commit -m "cache: catalog.json $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            for i in 1 2 3; do git push origin pipeline-cache && break || sleep $((i * 3)); done
          fi

      # ── Step 2: fetch norma metadata → graph_shards/ ──────────────────────────
      # fetch_normas.py reads catalog.json, skips any idNorma whose JSON file
      # already exists in ./cache/normas/ (pipeline-cache worktree), and fetches
      # the rest.  graph_shards/ and progress.json are saved at the workspace
      # root every 50 completions so they're ready for the save step below.
      - name: Fetch normas graph
        run: python scripts/fetch_normas.py --data-root .

      # ── Step 3: persist all in-progress state ───────────────────────────────
      # Runs even when the job is cancelled (e.g. 6-hour wall-clock timeout) so
      # partially-fetched state survives across runs.  Critically saves
      # catalog.json because build_catalog.py now checkpoints partial state
      # (`complete: false`) mid-fetch, and that partial catalog is what lets
      # the next run resume from the last keyset cursor.
      # The norma JSON files themselves already live inside the ./cache/
      # worktree, so `git add -A` picks them up automatically.
      - name: Save in-progress state to pipeline-cache
        if: always()
        run: |
          cp catalog.json             ./cache/catalog.json             2>/dev/null || true
          if [ -d ./graph_shards ]; then
            rm -rf ./cache/graph_shards && cp -r ./graph_shards ./cache/
            rm -f ./cache/graph.json   # drop stale pre-shard monolithic graph
          fi
          cp fetch_normas_progress.json ./cache/fetch_normas_progress.json 2>/dev/null || true
          git -C cache add -A
          if git -C cache diff --cached --quiet; then
            echo "No in-progress state to save"
          else
            git -C cache commit -m "cache: in-progress state $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            for i in 1 2 3; do git push origin pipeline-cache && break || sleep $((i * 3)); done
          fi

      # ── Step 4: publish graph_shards/ to main when complete ─────────────────
      # Only commits to the code branch once every norma in the catalog has been
      # fetched (graph node count ≥ 95% of catalog entries and catalog is marked
      # complete).  fetch-and-build.yml reads the graph (shard-aware) from the
      # code branch, so this is the step that unblocks it.
      - name: Commit graph_shards and catalog.json to main
        run: |
          python - <<'PYEOF'
          import json, os, sys
          sys.path.insert(0, "scripts")
          from utils import load_graph, graph_exists
          if not graph_exists("graph.json") or not os.path.exists("catalog.json"):
              print("graph or catalog.json missing — skipping main commit")
              sys.exit(0)
          g = load_graph("graph.json")
          raw = json.loads(open("catalog.json").read())
          entries = raw if isinstance(raw, list) else raw.get("entries", [])
          catalog_complete = raw.get("complete", False) if isinstance(raw, dict) else True
          done, total = len(g), len(entries)
          print(f"graph: {done}/{total} nodes, catalog_complete={catalog_complete}")
          if catalog_complete and total and done >= total * 0.95:
              open(".graph_ready", "w").write("1")
              print("Graph is ready — will commit to main")
          else:
              print(f"Graph not yet ready ({done}/{total}) — skipping main commit")
          PYEOF
          if [ -f .graph_ready ]; then
            git rm -q --cached --ignore-unmatch graph.json   # drop any legacy file
            rm -f graph.json
            git add graph_shards catalog.json
            git diff --cached --quiet && echo "No changes to graph_shards/catalog.json" || (
              git commit -m "chore: update graph_shards and catalog.json"
              git push origin "${{ github.ref_name }}"
            )
          fi
